name: NexOperator
options:
  bundleIdPrefix: com.nexia
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Release
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  NexifyTermWidget:
    type: app-extension
    platform: macOS
    sources: [NexifyTermWidget]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexia.nexifyterm.widget
        PRODUCT_NAME: NexifyTermWidget
        MARKETING_VERSION: "0.1.14"
        CURRENT_PROJECT_VERSION: "13"
        SWIFT_VERSION: "5"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    info:
      path: NexifyTermWidget/Info.plist
    entitlements:
      path: NexifyTermWidget/NexifyTermWidget.entitlements

  NexOperator:
    type: application
    platform: macOS
    sources: [NexOperator]
    postBuildScripts:
      - name: "Bundle WhatsApp Bridge Source"
        # Copies the bridge sources (TypeScript only) into the .app bundle so
        # the in-app installer can lay them down in Application Support and run
        # `npm install` locally on first activation. node_modules and dist are
        # produced at runtime; never ship them.
        script: |
          set -e
          SRC="$SRCROOT/backend/whatsapp"
          DEST="$CONFIGURATION_BUILD_DIR/$PRODUCT_NAME.app/Contents/Resources/whatsapp-bridge"
          mkdir -p "$DEST"
          rsync -a --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude data \
            --exclude test-data \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            "$SRC/" "$DEST/"
        outputFiles:
          - $(CONFIGURATION_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/Resources/whatsapp-bridge/package.json
    dependencies:
      - package: SwiftTerm
      - package: Sparkle
      - target: NexifyTermWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexia.nexifyterm
        PRODUCT_NAME: NexifyTerm
        MARKETING_VERSION: "0.1.14"
        CURRENT_PROJECT_VERSION: "13"
        SWIFT_VERSION: "5"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    info:
      path: NexOperator/Resources/Info.plist
      properties:
        CFBundleName: NexifyTerm
        CFBundleDisplayName: NexifyTerm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: "com.nexia.nexifyterm.oauth"
            CFBundleURLSchemes:
              - nexifyterm
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSPrincipalClass: NSApplication
        NSAppleEventsUsageDescription: "NexOperator precisa controlar outros aplicativos para automação do sistema."
        NSMicrophoneUsageDescription: "NexifyTerm precisa do microfone para gravar áudio que você opte por capturar."
        NSCameraUsageDescription: "NexifyTerm pode precisar acessar a câmera para captura de tela em algumas configurações."
        NSContactsUsageDescription: "NexOperator pode precisar acessar contatos para operações do sistema."
        NSCalendarsUsageDescription: "NexOperator pode precisar acessar calendários para operações do sistema."
        NSLocationUsageDescription: "NexOperator pode precisar da localização para configurações de rede e sistema."
        NSPhotoLibraryUsageDescription: "NexOperator pode precisar acessar fotos para operações do sistema."
        NSBluetoothAlwaysUsageDescription: "NexOperator pode precisar do Bluetooth para diagnósticos de dispositivos."
        NSSystemAdministrationUsageDescription: "NexOperator precisa de privilégios administrativos para gerenciar configurações do sistema."
        SUFeedURL: "https://nexify.ink/downloads/appcast.xml"
        SUPublicEDKey: "Wmi2NH93JmwEeKPlQgjnqcTKnoFvHfCiEYDvvUS7WeM="
        SUEnableAutomaticChecks: true
        NSServices:
          - NSMessage: openInNexifyTerm
            NSMenuItem:
              default: "Open in NexifyTerm"
            NSSendTypes:
              - NSFilenamesPboardType
              - public.file-url
            NSReturnTypes: []
    entitlements:
      path: NexOperator/Resources/NexOperator.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.automation.apple-events: true
        com.apple.security.device.usb: true
        com.apple.security.device.bluetooth: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.camera: true
        com.apple.security.device.microphone: true
        com.apple.security.personal-information.addressbook: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.personal-information.location: true
        com.apple.security.personal-information.photos-library: true
        com.apple.security.application-groups:
          - group.com.nexia.nexifyterm
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.cs.allow-dyld-environment-variables: true
